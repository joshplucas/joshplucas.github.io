<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>blebleble blublublu</title>
    <link rel="stylesheet" href="style.css">

    <!--style.css is not working with github pages so Ill move it to inline so it just works -->
    <style>
        body {
            background-color: rgb(0, 0, 0);
        }

        .container {
            padding: 20px;
        }

        .container h1 {
            padding: 10px 10px 0 10px;
            margin: 0;
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 100px;
            font-family: 'Google sans';
        }

        .container h6 {
            padding: 0px;
            margin: 0;
            text-align: center;
            font-family: 'google sans';
            color: white;
        }

        .search {
            padding: 20px;
            text-align: center;
        }

        .search form {
            display: inline-block;
            width: 75%;
            max-width: 500px;
            position: relative;
            text-align: left;
        }

        .search input[type="text"] {
            background-color: white;
            color: rgb(0, 0, 0);
            font-family: 'Google sans';

            border: 2px solid rgb(255, 255, 255);
            border-color: rgb(166, 166, 166);
            padding: 20px 140px 20px 25px;
            border-radius: 100px;
            outline: none;

            box-sizing: border-box;
            transition: border-color 0.3s ease;
            width: 100%;
        }

        .search input[type="text"]:focus {
            border-color: rgb(11, 0, 158);
        }

        .gemini-button {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: 150px;
            font-size: smaller;
            text-decoration: none;
            color: white;
            font-family: 'Google sans';
            border: 2px solid transparent;
            border-radius: 100px;
            padding: 10px 18px;
            background-image:
                linear-gradient(rgb(0, 0, 0), rgb(0, 0, 0)),
                linear-gradient(45deg, #4285f4, #9b51e0, #ea4335);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            transition: transform 0.2s ease;
        }

        .gemini-button:hover {
            transform: translateY(-50%) scale(1.05);
        }

        @media (max-width: 520px) {
            .search form {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                max-width: none;
            }

            .search input[type="text"] {
                padding: 20px 20px 20px 25px;
            }

            .gemini-button {
                position: static;
                transform: none;
                right: auto;
                top: auto;
                margin-top: 12px;

                justify-content: center;
            }

            .gemini-button:hover {
                transform: scale(1.05);
            }
        }

        #countdown {
            color: white;
            font-family: 'Google sans';
            text-align: center;
            font-size: 24px;
            margin-top: 30px;
        }

        .timelabel {
            color: white;
            font-family: 'Google sans';
            text-align: center;
            padding-top: 75px;
        }

        .top-left-clock {
            position: fixed;
            top: 16px;
            left: 16px;
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-family: 'Google sans';
            font-size: 14px;
            letter-spacing: 0.02em;
            z-index: 1000;
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }

        .dropdown {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 1000;
        }

        .dropdownbutton {
            padding: 10px 16px;
            font-family: 'Google Sans';
            font-size: 14px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            transition: background 0.3s;
        }

        .dropdownbutton:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .hidog {
            display: none;
            position: absolute;
            right: calc(100% + 12px);
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            padding: 10px 16px;
            font-family: 'Google Sans';
            font-size: 14px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }

        .dropdown:hover .hidog {
            display: block;
        }

        .dropcontent {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .dropcontent img {
            max-width: 200px;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        .dropdown:hover .dropcontent {
            display: block;
        }
    </style>

</head>

<body>

    <div class="dropdown">
        <div class="hidog">
            Hi dag &#127881;
        </div>
        <button class="dropdownbutton">
            Dropdown
            <div class="dropcontent">
                <img src="dog.png" alt="dag">
            </div>
        </button>

    </div>

    <div id="topLeftClock" class="top-left-clock">Oh noo the time is loading brow</div>
    <div class="top-right-clock"> </div>

    <div class="container">
        <h1>Hello</h1>
        <h6>Website website website</h6>
    </div>

    <div class='timelabel'>
        <h4> Exams end in:</h4>
    </div>

    <div id="countdown">Loading countdown...</div>

    <script>
        const targetDate = new Date(2026, 5, 12, 10, 30, 15).getTime();
        const countdownDisplay = document.getElementById("countdown");

        const timerInterval = setInterval(() => {
            const distance = targetDate - new Date().getTime();

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = String(Math.floor((distance % 86400000) / 3600000)).padStart(2, '0');
            const minutes = String(Math.floor((distance % 3600000) / 60000)).padStart(2, '0');
            const seconds = String(Math.floor((distance % 60000) / 1000)).padStart(2, '0');

            countdownDisplay.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;

            if (distance < 0) {
                clearInterval(timerInterval);
                countdownDisplay.innerHTML = "Exams are over";
            }
        }, 1000);




        function pad(value) {
            return String(value).padStart(2, '0');
        }

        function updateTopLeftClock() {
            const clock = document.getElementById('topLeftClock');
            if (!clock) return;
            const now = new Date();
            const h = now.getHours();
            const hours = pad(h % 12 || 12);
            const minutes = pad(now.getMinutes());
            const seconds = pad(now.getSeconds());
            clock.textContent = `${hours}:${minutes}:${seconds}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const geminiButton = document.querySelector('.gemini-button');
            if (geminiButton) {
                geminiButton.href = 'https://gemini.google.com/';
            }
            updateTopLeftClock();
            setInterval(updateTopLeftClock, 1000);
        });
    </script>


    <div class="search">
        <form action="https://www.google.com/search" method="get" target="_blank">
            <input type="text" name="q" placeholder="Search Google..." autocomplete="off">
            <a class="gemini-button" href="https://gemini.google.com/" rel="noopener noreferrer">Open gemini</a>
        </form>
    </div>

</body>

</html>
