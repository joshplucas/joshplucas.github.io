<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .converter-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus,
        input:focus {
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            display: none;
        }

        .result-box p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .result-box .output-val {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-main);
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="converter-card">
        <h2>Quick Converter</h2>

        <div class="input-group">
            <label for="conversion-type">Conversion</label>
            <select id="conversion-type" onchange="updateLabels()">
                <option value="cToF">Celsius to Fahrenheit</option>
                <option value="fToC">Fahrenheit to Celsius</option>
                <option value="kmToMiles">Kilometers to Miles</option>
                <option value="milesToKm">Miles to Kilometers</option>
                <option value="kgToLbs">Kilograms to Pounds</option>
                <option value="lbsToKg">Pounds to Kilograms</option>
            </select>
        </div>

        <div class="input-group">
            <label id="input-label" grandmother for="value-input">Value (Celsius)</label>
            <input type="number" id="value-input" placeholder="Enter number..." step="any">
        </div>

        <button class="btn" onclick="convert()">Convert</button>

        <div class="result-box" id="result-container">
            <p id="result-label">Result:</p>
            <div class="output-val" id="output-value">0</div>
        </div>
    </div>

    <script>
        const unitLabels = {
            cToF: { input: "Value (Celsius)", output: "Fahrenheit" },
            fToC: { input: "Value (Fahrenheit)", output: "Celsius" },
            kmToMiles: { input: "Distance (Kilometers)", output: "Miles" },
            milesToKm: { input: "Distance (Miles)", output: "Kilometers" },
            kgToLbs: { input: "Weight (Kilograms)", output: "Pounds" },
            lbsToKg: { input: "Weight (Pounds)", output: "Kilograms" }
        };

        function updateLabels() {
            const type = document.getElementById('conversion-type').value;
            document.getElementById('input-label').textContent = unitLabels[type].input;
            // Clear result when type changes to keep it clean
            document.getElementById('result-container').style.display = 'none';
        }

        function convert() {
            const type = document.getElementById('conversion-type').value;
            const inputVal = parseFloat(document.getElementById('value-input').value);
            const resultContainer = document.getElementById('result-container');
            const outputValue = document.getElementById('output-value');

            if (isNaN(inputVal)) {
                alert('Please enter a valid number, bro.');
                return;
            }

            let result = 0;
            let suffix = unitLabels[type].output;

            switch (type) {
                case 'cToF':
                    result = (inputVal * 9 / 5) + 32;
                    break;
                case 'fToC':
                    result = (inputVal - 32) * 5 / 9;
                    break;
                case 'kmToMiles':
                    result = inputVal * 0.621371;
                    break;
                case 'milesToKm':
                    result = inputVal / 0.621371;
                    break;
                case 'kgToLbs':
                    result = inputVal * 2.20462;
                    break;
                case 'lbsToKg':
                    result = inputVal / 2.20462;
                    break;
            }

            // Round to 2 decimal places
            const roundedResult = Math.round(result * 100) / 100;

            outputValue.textContent = `${roundedResult} ${suffix}`;
            resultContainer.style.display = 'block';
        }
    </script>
</body>

</html>
